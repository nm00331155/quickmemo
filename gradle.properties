# GitHub 共有用: 環境依存の値や秘密情報はこのファイルに入れない。
# プロジェクトキャッシュをリポジトリ外に出し、不要生成物の混入を抑える。
org.gradle.projectcachedir=../.gradle-project-cache/quickmemo

# 共通の Gradle 実行設定
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# Android/Kotlin 共通設定
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# ローカル external 参照は明示的に有効化するまで無効
useLocalRichEditor=false
